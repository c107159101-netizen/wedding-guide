<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>婚宴席位表 | 互動導覽系統 (莫蘭迪煙粉版)</title>
    <!-- 引入 Tailwind CSS 與 Google Fonts Noto Sans TC -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 莫蘭迪煙粉與燕麥色調定義 */
            --oatmeal-bg: #FAF6F0;       /* 暖燕麥底色 */
            --dusty-rose: #D4A396;       /* 莫蘭迪煙粉 */
            --cocoa-dark: #4A3F35;       /* 暖可可深棕 */
            --champagne-light: #F4EAE6;  /* 淺煙粉燕麥 */
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--oatmeal-bg);
            color: var(--cocoa-dark);
            -webkit-tap-highlight-color: transparent;
        }
        /* 橫向滾動條美化 */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #FFFFFF;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--dusty-rose);
            border-radius: 99px;
        }
        /* 隱藏滾動條 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between pb-6">

    <!-- 頂部 Header：融入燕麥白底與煙粉線條的優雅樣式 -->
    <header class="bg-white border-b-4 border-[#D4A396] py-4 px-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="bg-[#F4EAE6] border-2 border-[#4A3F35] px-4 py-1.5 shadow-[2px_2px_0px_0px_rgba(74,63,53,1)]">
                <h1 class="text-xl md:text-2xl font-black tracking-wider text-[#4A3F35]">婚宴席位表</h1>
            </div>
            <span class="text-xs font-bold border border-[#4A3F35] px-2 py-1 bg-white rounded shadow-[1px_1px_0px_0px_rgba(74,63,53,1)] text-[#D4A396] animate-pulse">手機即時查位 📱</span>
        </div>
    </header>

    <main class="flex-grow max-w-xl mx-auto w-full px-4 py-4 space-y-4">
        
        <!-- 搜尋區域（莫蘭迪質感卡片） -->
        <div class="bg-white p-4 rounded-xl border-4 border-[#4A3F35] shadow-[4px_4px_0px_0px_rgba(74,63,53,0.15)] space-y-3">
            <div class="flex items-center gap-2">
                <span class="text-xl">🔍</span>
                <div>
                    <h2 class="text-sm font-black text-[#4A3F35]">輸入姓名．快速找桌</h2>
                    <p class="text-[10px] text-stone-500">輸入一個字即可搜尋！點選名字可自動定位及導航</p>
                </div>
            </div>
            
            <!-- 搜尋框 -->
            <div class="relative flex items-center">
                <input type="text" id="nameSearchInput" placeholder="請輸入姓名（例如：洪國憲、Sean）..." 
                    class="w-full pl-4 pr-12 py-3 bg-stone-50 border-3 border-[#4A3F35] rounded-lg focus:bg-white focus:ring-0 outline-none transition-all text-base text-[#4A3F35] font-bold placeholder-stone-400">
                
                <!-- 清除按鈕 -->
                <button id="clearSearchBtn" class="hidden absolute right-4 text-stone-400 hover:text-[#4A3F35] p-1 rounded-full hover:bg-stone-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- 即時搜尋結果 -->
            <div id="quickSearchResults" class="hidden max-h-[220px] overflow-y-auto divide-y-2 divide-[#4A3F35] border-3 border-[#4A3F35] rounded-lg bg-white shadow-[2px_2px_0px_0px_rgba(74,63,53,0.1)]">
                <!-- JS 即時生成項目 -->
            </div>

            <!-- 姓氏快篩橫向滾動列 -->
            <div class="space-y-1">
                <p class="text-[10px] font-black text-stone-500 tracking-wider">按姓氏快速篩選：</p>
                <div class="overflow-x-auto hide-scrollbar -mx-1 px-1">
                    <div id="surnameContainer" class="flex gap-2 pb-1 whitespace-nowrap">
                        <!-- JS 自動分析並填充 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 宴會廳地圖區域 -->
        <div class="bg-white p-3 rounded-xl border-4 border-[#4A3F35] shadow-[4px_4px_0px_0px_rgba(74,63,53,0.15)] space-y-2">
            <div class="flex justify-between items-center text-xs font-black text-[#4A3F35]">
                <span class="border-b-2 border-[#D4A396] pb-0.5">🗺️ 宴會廳現場配置圖</span>
                <span class="md:hidden text-stone-400 animate-pulse">左右滑動可看全貌 ↔</span>
            </div>
            
            <!-- 畫布水平滾動外包裝 -->
            <div id="canvasWrapper" class="overflow-x-auto custom-scrollbar rounded-lg border-2 border-stone-200 bg-white scroll-smooth">
                <div class="relative" style="width: 820px; height: 500px;">
                    <canvas id="responsiveCanvas" width="820" height="500" class="block cursor-pointer"></canvas>
                </div>
            </div>
        </div>

        <!-- 動態指引與路線說明面板 -->
        <div id="guideSection" class="bg-white p-4 rounded-xl border-4 border-[#4A3F35] shadow-[4px_4px_0px_0px_rgba(74,63,53,0.15)] transition-all duration-300 min-h-[100px] flex flex-col justify-center">
            <!-- 預設提示 -->
            <div id="guidePlaceholder" class="text-center py-2 text-stone-400 space-y-1">
                <div class="text-2xl">🥂</div>
                <p class="text-xs font-black text-stone-500">在上方輸入您的名字，或直接點選地圖圓圈</p>
                <p class="text-[10px] text-stone-400">系統會即時為您畫出從出入口到座位的位置與路線！</p>
            </div>

            <!-- 啟動狀態 -->
            <div id="guideContent" class="hidden space-y-3">
                <div class="flex justify-between items-start border-b-2 border-[#E6DFD5] pb-2">
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 id="targetTableName" class="text-lg font-black text-[#4A3F35]"></h3>
                            <span id="targetTableBadge" class="text-[10px] px-2.5 py-0.5 rounded-full font-bold border border-[#4A3F35] shadow-[1px_1px_0px_0px_rgba(74,63,53,1)]"></span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block text-[9px] font-black text-stone-400 tracking-wider">建議進場大門</span>
                        <span id="suggestedEntrance" class="font-black text-xs text-[#D4A396]"></span>
                    </div>
                </div>

                <!-- 步行路徑文字 -->
                <div class="bg-[#F4EAE6] p-3 rounded-lg border-2 border-[#4A3F35] shadow-[2px_2px_0px_0px_rgba(74,63,53,0.1)] space-y-0.5">
                    <p class="text-[11px] font-black text-[#4A3F35] flex items-center gap-1">🚶 帶位指引說明：</p>
                    <p id="guideRouteText" class="text-xs leading-relaxed text-[#4A3F35] font-bold"></p>
                </div>

                <!-- 同桌貴賓 -->
                <div class="space-y-1.5">
                    <p class="text-[10px] font-black text-stone-400 tracking-wider">📋 同桌貴賓名單：</p>
                    <div id="tableGuestList" class="flex flex-wrap gap-1.5 max-h-[120px] overflow-y-auto pr-1">
                        <!-- 同桌名單 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 桌客名單大清單：莫蘭迪優雅版（可可色徽章、下劃線） -->
        <div class="bg-[#F4EAE6] p-4 rounded-xl border-4 border-[#4A3F35] shadow-[4px_4px_0px_0px_rgba(74,63,53,0.15)] space-y-4">
            <div class="border-b-4 border-[#4A3F35] pb-2 text-center">
                <h3 class="text-base font-black tracking-widest text-[#4A3F35]">✨ 婚宴席位名冊大覽 ✨</h3>
                <p class="text-[9px] text-[#4A3F35]/70 font-bold">點擊下方任何桌號或人名，地圖會自動對應定位</p>
            </div>

            <div id="classicTableList" class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
                <!-- 由 JS 依據原圖佈局，渲染出精美的大方排版 -->
            </div>
        </div>

    </main>

    <!-- 底部資訊 -->
    <footer class="bg-[#4A3F35] text-[#FAF6F0] py-6 text-center mt-6 border-t-4 border-[#D4A396]">
        <div class="max-w-md mx-auto px-4 space-y-1">
            <p class="font-black tracking-[0.2em] text-[11px]">WEDDING SEATING MAP SYSTEM</p>
            <p class="text-[9px] text-stone-300">百年好合 ． 圓滿喜宴</p>
        </div>
    </footer>

    <script>
        // 完全對應 婚宴席位圖.jpg 之原始數據
        const tables = {
            "M": { id: "M", name: "主桌", type: "main", guests: ["洪國憲", "洪蘊美", "洪承緯", "劉書念", "劉偉祥", "劉榮子", "劉慶昌", "劉金蘭", "林國光", "余細美"], x: 195, y: 240, entrance: "left", guide: "從左側出入口進入後向左前行，舞台前方鋪設紅色緞帶的尊榮雙環圓桌即是主桌。" },
            "2": { id: "2", name: "2", type: "guest", guests: ["陳進一", "李春金", "周秀玲", "李慶鳳", "謝春花", "李慶福", "李玉娟", "賴忠賢", "賴金英", "劉芝姍"], x: 340, y: 110, entrance: "left", guide: "從左側出入口進入後直走到底，最靠近舞台方向的第一排右側席位。" },
            "3": { id: "3", name: "3", type: "guest", guests: ["潘金花", "劉慶榮", "劉宸維", "劉睿哲", "潘秋麗", "石剛位", "劉慶星夫妻", "王文賓夫妻"], x: 340, y: 180, entrance: "left", guide: "從左側出入口進入後直行，位於主桌正後方第一排的左側席位。" },
            "4": { id: "4", name: "4", type: "guest", guests: ["林新禧", "吳青芬", "林柏廷", "林柏佑", "林新智", "陳育卿", "林品諺", "林品誠", "劉書亞", "張智堯"], x: 340, y: 300, entrance: "left", guide: "由左側出入口進入後右轉走道，左手邊第二排第一桌（靠中央走道）。" },
            "5": { id: "5", name: "5", type: "guest", guests: ["胡安生", "胡傑倫", "胡志豪", "胡雁容", "張湘濤", "張林梅", "蘇裕淵", "蘇燕萍", "蘇愛真", "蘇愛理"], x: 340, y: 370, entrance: "left", guide: "從左側出入口進入即達，靠近大門左側起算的第一張桌位。" },
            "6": { id: "6", name: "6", type: "guest", guests: ["洪啟翔", "洪萱魴", "洪浩程", "洪鐿綺", "幸秉憲", "幸敏環", "林金文", "林保暻", "莊幸雄", "莊綺諼"], x: 465, y: 110, entrance: "left", guide: "由左側出入口進入直走，到中央走道後左轉，位於第二排最內側。" },
            "7": { id: "7", name: "7", type: "guest", guests: ["劉凱逸", "劉兆葦", "高智誠", "田詩妤", "李俊福", "李傑瑞", "高路得", "蘇秀蓮", "廖惠如", "曾淑玲"], x: 465, y: 180, entrance: "left", guide: "由左側出入口進入，位於中央紅毯走道左側的第二排席位。" },
            "8": { id: "8", name: "8", type: "guest", guests: ["高俊雄", "高瑤瑤", "高澤安", "高緹恩", "林子航", "林慧瑄", "李淑惠", "晨曦", "邱子辰", "官郁均"], x: 465, y: 300, entrance: "right", guide: "由右側進場口（粉紅大門）進入，位於中央紅毯走道右側的第二排席位。" },
            "9": { id: "9", name: "9", type: "guest", guests: ["Sean", "李凱琳", "施晴", "施愛", "李俊豪", "李惠子", "李言希", "李語妃", "高淑珍", "高淑美"], x: 465, y: 370, entrance: "right", guide: "由右側進場口進入後右轉，位於第二排最外側（靠近進場口方向）。" },
            "10": { id: "10", name: "10", type: "guest", guests: ["黃聖元", "黃心惠", "楊華甸", "彭振宏", "廖子君", "張嘉成", "戴安毅", "幸秉文", "沈中華", "莊博允"], x: 590, y: 110, entrance: "right", guide: "由右側進場口進入，沿走道往舞台方向直行，位於右側第三排最靠牆席位。" },
            "11": { id: "11", name: "11", type: "guest", guests: ["楊綏湄", "塗綰葶", "陳姿涵", "許霈晴", "蔡汶邦", "周柄君", "吳宇瞻", "吳岱融", "李珮晴", "丁元閔"], x: 590, y: 180, entrance: "right", guide: "由右側進場口直行跨過走道，位於中央走道右側的第三排。" },
            "12": { id: "12", name: "12", type: "guest", guests: ["李星華", "李政偉", "李惠敏", "鍾宇平", "鍾心敏", "林睿凡", "林汶其", "黃隆盛", "張智超", "張嘉樺"], x: 590, y: 300, entrance: "right", guide: "由右側進場口進入直走，位於中央走道右側 third 排（偏外側位置）。" },
            "13": { id: "13", name: "13", type: "guest", guests: ["許舒涵", "林景麗", "黃瑄", "何寧禎", "黃婷評", "牟明柔", "陳映綺", "李詩璇", "莊思華", "莊思語"], x: 590, y: 370, entrance: "right", guide: "由右側進場口進入，右手邊最靠近主要入口的第三列席次。" },
            "14": { id: "14", name: "14", type: "guest", guests: ["鄒文中", "鄒淑惠", "林文宇", "林茜晨", "何友彰", "莊榮國", "莊春妹"], x: 715, y: 110, entrance: "right", guide: "由右側進場口進入直走到底，最靠近舞台與右側外端牆面交界的第四排位置。" },
            "15": { id: "15", name: "15", type: "backup", guests: [], x: 715, y: 180, entrance: "right", guide: "位於右側進場口直走第四排靠牆席位（此桌目前安排為預備桌）。" }
        };

        let selectedTableId = null;
        let pulseStep = 0;
        let animationFrameId = null;

        const canvas = document.getElementById('responsiveCanvas');
        const ctx = canvas.getContext('2d');
        const searchInput = document.getElementById('nameSearchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const quickResults = document.getElementById('quickSearchResults');
        const canvasWrapper = document.getElementById('canvasWrapper');

        function init() {
            renderSurnames();
            renderClassicTableList();
            drawMap();
            animatePulse();

            // 搜尋框鍵入監聽
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value;
                toggleClearButton(query);
                handleSearch(query);
            });

            // 清除搜尋按鈕
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                toggleClearButton('');
                quickResults.classList.add('hidden');
                searchInput.focus();
            });

            // 點擊 Canvas 圓圈定位
            canvas.addEventListener('click', handleCanvasClick);
            
            // 點擊外部自動收合搜尋選單
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !quickResults.contains(e.target) && !clearSearchBtn.contains(e.target)) {
                    quickResults.classList.add('hidden');
                }
            });
        }

        // 搜尋 X 清除按鈕顯示狀態
        function toggleClearButton(val) {
            if (val.length > 0) {
                clearSearchBtn.classList.remove('hidden');
            } else {
                clearSearchBtn.classList.add('hidden');
            }
        }

        // 提取所有賓客的第一個字作為「姓氏快篩按鈕」
        function renderSurnames() {
            const surnames = new Set();
            Object.values(tables).forEach(t => {
                t.guests.forEach(g => {
                    if (g.length > 0 && g !== "Sean") {
                        // 處理包含夫妻的情況
                        const cleanName = g.replace("夫妻", "");
                        surnames.add(cleanName[0]);
                    }
                });
            });

            const sortedSurnames = Array.from(surnames).sort();
            const container = document.getElementById('surnameContainer');
            
            container.innerHTML = sortedSurnames.map(s => `
                <button onclick="quickFilterSurname('${s}')" 
                    class="px-3.5 py-1.5 bg-white hover:bg-[#4A3F35] hover:text-white active:scale-95 border-2 border-[#4A3F35] text-xs font-bold text-[#4A3F35] rounded-lg transition-all shadow-[1px_1px_0px_0px_rgba(74,63,53,1)]">
                    ${s} 氏
                </button>
            `).join('');
        }

        function quickFilterSurname(surname) {
            searchInput.value = surname;
            toggleClearButton(surname);
            handleSearch(surname);
            searchInput.focus();
        }

        // 搜尋演算法（相容模糊搜尋與夫妻合併姓名處理）
        function handleSearch(query) {
            const val = query.trim().toLowerCase();
            if (!val) {
                quickResults.classList.add('hidden');
                return;
            }

            const matches = [];
            Object.values(tables).forEach(t => {
                t.guests.forEach(g => {
                    if (g.toLowerCase().includes(val)) {
                        matches.push({ name: g, tableId: t.id, tableName: t.name === "主桌" ? "主桌" : `${t.name}號桌` });
                    }
                });
            });

            if (matches.length > 0) {
                quickResults.classList.remove('hidden');
                quickResults.innerHTML = matches.map(m => `
                    <div onclick="selectGuest('${m.tableId}', '${m.name}')" 
                        class="px-5 py-3 hover:bg-[#F4EAE6] cursor-pointer flex justify-between items-center transition-colors active:bg-[#F4EAE6]">
                        <div>
                            <span class="font-black text-[#4A3F35] text-base">${m.name}</span>
                            <span class="text-xs text-stone-500 ml-2">在 ${m.tableName}</span>
                        </div>
                        <span class="text-xs font-bold text-[#4A3F35] border border-[#4A3F35] px-2 py-0.5 bg-[#FAF6F0] shadow-[1px_1px_0px_0px_rgba(74,63,53,1)]">看位置 ➜</span>
                    </div>
                `).join('');
            } else {
                quickResults.classList.remove('hidden');
                quickResults.innerHTML = `
                    <div class="px-5 py-6 text-center text-stone-500 text-sm font-bold">
                        沒有搜尋到符合「${query}」的來賓
                    </div>
                `;
            }
        }

        function selectGuest(tableId, guestName) {
            quickResults.classList.add('hidden');
            selectTable(tableId, guestName);
        }

        // 下半部完全還原「婚宴席位圖.jpg」列表排版
        function renderClassicTableList() {
            const container = document.getElementById('classicTableList');
            
            // 按原圖排列順序：左側 (M, 2, 3, 4, 5, 6, 7)，右側 (8, 9, 10, 11, 12, 13, 14, 15)
            const leftColumnKeys = ["M", "2", "3", "4", "5", "6", "7"];
            const rightColumnKeys = ["8", "9", "10", "11", "12", "13", "14", "15"];
            
            const renderColumn = (keys) => {
                return keys.map(key => {
                    const t = tables[key];
                    const isBackup = t.type === 'backup';
                    
                    // 還原圓徽章：主桌寫「主桌」，其餘寫數字
                    const badgeText = t.id === 'M' ? '主桌' : t.id;
                    const guestNames = isBackup ? '<span class="text-[#4A3F35]/50 italic">( 預備桌 )</span>' : t.guests.join('、');

                    return `
                        <div id="listItem-${t.id}" onclick="selectTable('${t.id}')" 
                            class="group cursor-pointer py-2.5 transition-all duration-300 rounded-lg px-2 hover:bg-white/50 border-b-2 border-[#4A3F35]/30">
                            <div class="flex items-start gap-3">
                                <!-- 還原黑底白字圓圈徽章 -> 優雅改版為暖可可底色 -->
                                <div class="w-10 h-10 rounded-full bg-[#4A3F35] text-white flex items-center justify-center font-black text-xs shrink-0 shadow-[2px_2px_0px_0px_rgba(254,249,245,1)] border border-[#4A3F35]">
                                    ${badgeText}
                                </div>
                                <div class="space-y-1">
                                    <div class="text-xs font-black text-[#4A3F35] group-hover:underline">
                                        ${t.name === '主桌' ? '主桌貴賓' : t.name + ' 號桌'}
                                    </div>
                                    <p class="text-xs text-[#4A3F35] leading-relaxed font-medium tracking-wide">
                                        ${guestNames}
                                    </p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            };

            container.innerHTML = `
                <div class="space-y-4">${renderColumn(leftColumnKeys)}</div>
                <div class="space-y-4">${renderColumn(rightColumnKeys)}</div>
            `;
        }

        // 桌位點選定位與帶位資訊更新
        function selectTable(id, highlightGuestName = null) {
            selectedTableId = id;
            const table = tables[id];

            // 1. 切換顯示下方引導面板
            const placeholder = document.getElementById('guidePlaceholder');
            const content = document.getElementById('guideContent');
            placeholder.classList.add('hidden');
            content.classList.remove('hidden');

            document.getElementById('targetTableName').innerText = table.name === "主桌" ? "主桌席次" : `${table.name} 號桌席`;
            
            const badge = document.getElementById('targetTableBadge');
            if (table.type === 'main') {
                badge.innerText = "主桌 (雙環圓圈)";
                badge.className = "text-[10px] px-2.5 py-0.5 rounded-full font-bold bg-[#4A3F35] text-white";
            } else if (table.type === 'backup') {
                badge.innerText = "預備席桌";
                badge.className = "text-[10px] px-2.5 py-0.5 rounded-full font-bold bg-white text-[#4A3F35] border border-[#4A3F35]";
            } else {
                badge.innerText = "一般客席";
                badge.className = "text-[10px] px-2.5 py-0.5 rounded-full font-bold bg-[#D4A396] text-white border border-[#4A3F35] shadow-[1px_1px_0px_0px_rgba(74,63,53,1)]";
            }

            document.getElementById('suggestedEntrance').innerText = table.entrance === 'left' ? '左出入口 (灰半圓)' : '右進場口 (粉紅半圓)';
            document.getElementById('guideRouteText').innerText = table.guide;

            // 點選名單高亮
            const guestListDiv = document.getElementById('tableGuestList');
            if (table.guests.length > 0) {
                guestListDiv.innerHTML = table.guests.map(g => {
                    const isHighlighted = highlightGuestName && g.includes(highlightGuestName);
                    return `
                        <span class="px-2.5 py-1 rounded border border-[#4A3F35] text-xs font-bold transition-all duration-300 ${isHighlighted ? 'bg-[#D4A396] text-white scale-105 shadow-[2px_2px_0px_0px_rgba(74,63,53,1)]' : 'bg-white text-[#4A3F35]'}">
                            ${g}
                        </span>
                    `;
                }).join('');
            } else {
                guestListDiv.innerHTML = `<span class="text-stone-500 text-xs font-bold italic">（目前為預備席空桌，可由婚顧人員彈性安排入座）</span>`;
            }

            // 2. 移動手機畫布使目標桌位置中
            const wrapperWidth = canvasWrapper.clientWidth;
            const targetScrollX = table.x - (wrapperWidth / 2);
            canvasWrapper.scrollTo({
                left: targetScrollX,
                behavior: 'smooth'
            });

            // 3. 高亮下方列表項
            document.querySelectorAll('[id^="listItem-"]').forEach(el => {
                el.className = "group cursor-pointer py-2.5 transition-all duration-300 rounded-lg px-2 hover:bg-white/50 border-b-2 border-[#4A3F35]/30";
            });
            const activeListItem = document.getElementById(`listItem-${id}`);
            if (activeListItem) {
                activeListItem.className = "group cursor-pointer py-2.5 transition-all duration-300 rounded-lg px-2 hover:bg-white/50 border-b-2 border-[#4A3F35]/30 bg-white scale-[1.02] shadow-[3px_3px_0px_0px_rgba(74,63,53,1)] border-2 border-[#4A3F35]";
                // 平滑滾動到清單該項
                activeListItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // 重新繪製地圖
            drawMap();
        }

        // 地圖 Canvas 點擊偵測
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            // 計算 Canvas 原始 820 * 500 的邏輯座標
            const x = (e.clientX - rect.left) * (820 / rect.width);
            const y = (e.clientY - rect.top) * (500 / rect.height);

            let clickedTableId = null;
            Object.values(tables).forEach(table => {
                const radius = table.type === 'main' ? 38 : 28;
                const dist = Math.sqrt((x - table.x)**2 + (y - table.y)**2);
                if (dist <= radius) {
                    clickedTableId = table.id;
                }
            });

            if (clickedTableId) {
                selectTable(clickedTableId);
            }
        }

        // 用 Canvas 重繪「婚宴席位圖.jpg」莫蘭迪煙粉風格
        function drawMap() {
            ctx.clearRect(0, 0, 820, 500);

            // 畫布白底底色
            ctx.fillStyle = '#FCFAF7';
            ctx.fillRect(0, 0, 820, 500);

            // 1. 舞台區域 (Stage) - 溫潤香檳色與暖可可線
            ctx.fillStyle = '#E6DFD5';
            ctx.fillRect(40, 80, 90, 290);
            ctx.strokeStyle = '#4A3F35';
            ctx.lineWidth = 2.5;
            ctx.strokeRect(40, 80, 90, 290);
            ctx.fillStyle = '#4A3F35';
            ctx.font = 'bold 18px "Noto Sans TC", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('舞 台', 85, 225);

            // 2. 音控室 (Sound Booth) - 燕麥白底
            ctx.fillStyle = '#FAF6F0';
            ctx.fillRect(40, 390, 90, 45);
            ctx.strokeRect(40, 390, 90, 45);
            ctx.fillStyle = '#4A3F35';
            ctx.font = 'bold 13px "Noto Sans TC", sans-serif';
            ctx.fillText('音 控', 85, 412.5);

            // 3. 中央走道 (Walkway) -「走道」文字標註
            ctx.fillStyle = '#4A3F35';
            ctx.font = '900 15px "Noto Sans TC", sans-serif';
            ctx.fillText('走道', 480, 240);

            // 4. 下方出入口半圓 (Entrances)
            // 左側出入口 (溫暖灰色半圓)
            ctx.fillStyle = '#D1C7BD';
            ctx.beginPath();
            ctx.arc(260, 475, 18, Math.PI, 0); // 半圓
            ctx.fill();
            ctx.strokeStyle = '#4A3F35';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = '#4A3F35';
            ctx.font = 'bold 12px "Noto Sans TC", sans-serif';
            ctx.fillText('↑ 出入口', 260, 445);

            // 右側進場口 (優雅莫蘭迪煙粉半圓)
            ctx.fillStyle = '#D4A396'; // 經典暖煙粉
            ctx.beginPath();
            ctx.arc(590, 475, 18, Math.PI, 0);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#4A3F35';
            ctx.fillText('↑ 出入口 (進場)', 590, 445);

            // 5. 動態導航路徑線 (Guide Line) - 莫蘭迪煙粉粗虛線
            if (selectedTableId) {
                const target = tables[selectedTableId];
                const startX = target.entrance === 'left' ? 260 : 590;
                const startY = 460;

                ctx.beginPath();
                ctx.strokeStyle = '#D4A396';
                ctx.lineWidth = 3.5;
                ctx.setLineDash([6, 5]);
                ctx.moveTo(startX, startY);

                // 計算主紅毯導航路徑
                if (target.y < 240) {
                    ctx.lineTo(startX, 240);
                    ctx.lineTo(target.x, 240);
                } else {
                    ctx.lineTo(startX, 335);
                    ctx.lineTo(target.x, 335);
                }
                ctx.lineTo(target.x, target.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 6. 繪製所有桌位
            Object.values(tables).forEach(table => {
                const isSelected = selectedTableId === table.id;
                const radius = table.type === 'main' ? 36 : 26;

                // 繪製選取時的圓環呼吸動畫（優雅煙粉色外環）
                if (isSelected) {
                    ctx.beginPath();
                    ctx.arc(table.x, table.y, radius + 4 + Math.sin(pulseStep) * 3, 0, Math.PI * 2);
                    ctx.strokeStyle = '#4A3F35';
                    ctx.lineWidth = 3;
                    ctx.fillStyle = 'rgba(212, 163, 150, 0.4)';
                    ctx.fill();
                    ctx.stroke();
                }

                // 圓圈主體：黑框、白底 (若點選則填充亮煙粉色)
                ctx.beginPath();
                ctx.arc(table.x, table.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = isSelected ? '#D4A396' : '#FFFFFF';
                ctx.fill();
                
                ctx.strokeStyle = '#4A3F35';
                ctx.lineWidth = isSelected ? 3.5 : 2;
                ctx.stroke();

                // 主桌雙圈設計
                if (table.type === 'main') {
                    ctx.beginPath();
                    ctx.arc(table.x, table.y, radius - 6, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // 桌號文字
                ctx.fillStyle = isSelected ? '#FFFFFF' : '#4A3F35';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (table.type === 'main') {
                    ctx.font = 'bold 13px "Noto Sans TC", sans-serif';
                    ctx.fillText('主桌', table.x, table.y);
                } else if (table.type === 'backup') {
                    ctx.font = 'bold 11px "Noto Sans TC", sans-serif';
                    if (isSelected) {
                        ctx.fillStyle = '#FFFFFF';
                    } else {
                        ctx.fillStyle = '#8C8276';
                    }
                    ctx.fillText('15', table.x, table.y - 6);
                    ctx.font = 'bold 8px "Noto Sans TC", sans-serif';
                    ctx.fillText('[預備桌]', table.x, table.y + 7);
                } else {
                    ctx.font = 'bold 14px "Noto Sans TC", sans-serif';
                    ctx.fillText(table.name, table.x, table.y);
                }
            });
        }

        // 地圖選取呼吸特效動畫迴圈
        function animatePulse() {
            pulseStep += 0.08;
            drawMap();
            animationFrameId = requestAnimationFrame(animatePulse);
        }

        window.onload = init;
    </script>
</body>
</html>
